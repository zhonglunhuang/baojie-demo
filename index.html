<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>寶傑營運管理系統 Demo</title>
<style>
*{box-sizing:border-box;margin:0}
body{font-family:-apple-system,"PingFang TC","Heiti TC","Microsoft JhengHei",sans-serif;background:#eef1f6;color:#1f2937;font-size:14px}
header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#123a63,#1e5b8f);color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;gap:12px;flex-wrap:wrap}
.hd-left{display:flex;align-items:center}
.logo{background:#fff;color:#123a63;font-weight:800;border-radius:8px;padding:6px 10px;margin-right:10px;font-size:16px}
.ttl{font-weight:700;font-size:16px}
.sub{font-size:11px;opacity:.8}
.hd-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hd-right label{font-size:12px;opacity:.85}
#roleSel{border:none;border-radius:8px;padding:7px 10px;font:inherit;font-weight:600;color:#123a63}
.bell{position:relative;background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:15px;color:#fff}
.cnt{position:absolute;top:-6px;right:-6px;background:#e74c3c;color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 5px;display:none}
nav#tabs{display:flex;gap:2px;background:#fff;border-bottom:1px solid #e2e6ee;padding:0 16px;overflow-x:auto}
.tab{padding:12px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:#5b6572;font-weight:500}
.tab:hover{color:#1e5b8f}
.tab.on{color:#1e5b8f;border-color:#1e5b8f;font-weight:700}
main{max-width:1180px;margin:20px auto;padding:0 16px 60px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(16,24,40,.08);padding:18px;margin-bottom:16px}
.card h3{margin-bottom:10px;font-size:15px;color:#123a63}
.card h4{margin:12px 0 8px;font-size:13px;color:#374151}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
.b-green{background:#e7f6ec;color:#1a7f37}
.b-red{background:#fdebec;color:#c0392b}
.b-amber{background:#fff4e0;color:#b45309}
.b-blue{background:#e8f1fd;color:#1d6fd1}
.b-purple{background:#f3e8fd;color:#7e3ff2}
.b-teal{background:#e0f5f4;color:#0f766e}
.b-gray{background:#eef0f4;color:#556}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;border-bottom:1px solid #eef0f4;text-align:left;vertical-align:middle}
th{background:#f8fafc;font-size:12px;color:#5b6572;font-weight:600}
tr:hover td{background:#fafbfd}
input,select,textarea{border:1px solid #d4dae4;border-radius:8px;padding:8px 10px;font:inherit;background:#fff;max-width:100%}
input[type=checkbox],input[type=radio]{width:15px;height:15px;padding:0;vertical-align:-2px;accent-color:#1e5b8f}
textarea{width:100%;min-height:64px}
input:focus,select:focus,textarea:focus{outline:2px solid #a8c7e8;border-color:#1e5b8f}
label.opt{display:inline-flex;align-items:center;gap:6px;margin:4px 12px 4px 0;cursor:pointer}
.field{margin-bottom:10px}
.field>span{display:block;font-size:12px;color:#5b6572;margin-bottom:4px;font-weight:600}
.btn{background:#1e5b8f;color:#fff;border:none;border-radius:8px;padding:9px 16px;font:inherit;cursor:pointer;font-weight:600}
.btn:hover{background:#174a75}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.ghost{background:#fff;color:#1e5b8f;border:1px solid #9dbcd8}
.btn.ghost:hover{background:#f0f6fb}
.btn.warn{background:#c0392b}.btn.warn:hover{background:#a53125}
.btn.green{background:#1a7f37}.btn.green:hover{background:#15682d}
.btn.amber{background:#d97706}.btn.amber:hover{background:#b45309}
.btn:disabled{opacity:.45;cursor:not-allowed}
button.ghost.hd{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:7px 12px;font:inherit;cursor:pointer;font-size:12px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;z-index:100}
.modal{background:#fff;border-radius:14px;max-width:880px;width:100%;padding:22px;position:relative;margin-bottom:40px}
.mclose{position:absolute;top:12px;right:14px;background:#eef0f4;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;color:#556}
.steps{display:flex;margin:14px 0 4px;flex-wrap:wrap;row-gap:10px}
.step{flex:1;min-width:86px;text-align:center;position:relative;font-size:12px;color:#8a93a3;padding-top:28px}
.step::before{content:attr(data-n);position:absolute;top:0;left:50%;transform:translateX(-50%);width:22px;height:22px;line-height:22px;border-radius:50%;background:#e2e6ee;color:#667;font-weight:700;font-size:11px}
.step::after{content:'';position:absolute;top:11px;left:calc(50% + 14px);width:calc(100% - 28px);height:2px;background:#e2e6ee}
.step:last-child::after{display:none}
.step.done{color:#1a7f37}
.step.done::before{background:#1a7f37;color:#fff;content:'✓'}
.step.done::after{background:#9fd6ae}
.step.now{color:#1e5b8f;font-weight:700}
.step.now::before{background:#1e5b8f;color:#fff}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.item-card{border:1px solid #e2e6ee;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px;background:#fff}
.item-card .nm{font-weight:700}
.item-card .pr{color:#123a63;font-weight:700;font-size:15px}
.warnbox{background:#fdf3e7;border:1px solid #f2c288;border-radius:10px;padding:12px;margin:10px 0;color:#8a5a10}
.okbox{background:#e7f6ec;border:1px solid #9fd6ae;border-radius:10px;padding:12px;margin:10px 0;color:#1a5c2c}
.infobox{background:#e8f1fd;border:1px solid #b5d2f2;border-radius:10px;padding:12px;margin:10px 0;color:#174a75}
.note{font-size:12px;color:#7b8494}
.kv{font-size:13px;line-height:2}
.kv b{color:#374151;margin-right:4px}
.sec{border-top:1px dashed #dfe3ea;margin-top:14px;padding-top:12px}
.sec>h4{margin-top:0}
.pill-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:6px 14px;border-radius:999px;background:#eef0f4;cursor:pointer;font-size:13px;color:#556;font-weight:500}
.pill.on{background:#1e5b8f;color:#fff;font-weight:700}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#123a63;color:#fff;padding:11px 20px;border-radius:10px;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.25);font-weight:600;animation:tfade 2.6s forwards}
@keyframes tfade{0%{opacity:0;transform:translate(-50%,10px)}10%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0}}
.qr{width:110px;height:110px;border:1px solid #ddd;border-radius:8px}
.low{color:#c0392b;font-weight:700}
.right{text-align:right}
.center{text-align:center}
.mt{margin-top:12px}
.flexrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.guide-ol{padding-left:20px;line-height:2}
.guide-ol b{color:#123a63}
.notif{border-left:3px solid #1e5b8f;background:#f8fafc;border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:8px}
.notif.unread{background:#e8f1fd;border-left-color:#e74c3c}
.notif .t{font-weight:700}
.notif .ts{font-size:11px;color:#8a93a3}
.scanwrap{position:relative;max-width:440px;background:#0b1220;border-radius:12px;overflow:hidden;aspect-ratio:4/3}
.scanwrap video{width:100%;height:100%;object-fit:cover;display:block}
.scanframe{position:absolute;inset:14% 16%;border:2px solid rgba(255,255,255,.9);border-radius:10px;box-shadow:0 0 0 999px rgba(0,0,0,.28);pointer-events:none}
.scanframe::after{content:'';position:absolute;left:4%;right:4%;top:50%;height:2px;background:rgba(231,76,60,.85)}
.bc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.bc-card{border:1px solid #e2e6ee;border-radius:10px;padding:12px;text-align:center;background:#fff}
.bc-card svg{max-width:100%;height:auto}
.card{overflow-x:auto}
@media (max-width:640px){
  main{margin:10px auto;padding:0 8px 60px}
  .card{padding:12px}
  th,td{padding:6px 6px;font-size:12px}
  header{padding:8px 10px}
  .modal{padding:14px}
  .overlay{padding:14px 6px}
}
@media print{header,nav,.btn{display:none!important}}

</style>
</head>
<body>
<header>
  <div class="hd-left"><span class="logo">寶傑</span><div><div class="ttl">營運管理系統 Demo</div><div class="sub">維修單管理 × 配件販售 × 庫存管理（純前端模擬）</div></div></div>
  <div class="hd-right">
    <label>目前角色</label>
    <select id="roleSel" autocomplete="off" onchange="setRole(this.value)"></select>
    <button class="bell" onclick="setTab('notifs')" title="通知">🔔<span id="bellCnt" class="cnt"></span></button>
    <button class="ghost hd" onclick="openGuide()">📖 流程指南</button>
    <button class="ghost hd" onclick="resetDemo()">重置示範資料</button>
  </div>
</header>
<nav id="tabs"></nav>
<main id="view"></main>
<div id="overlay" class="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal"><button class="mclose" onclick="closeModal()">✕</button><div id="modalBody"></div></div>
</div>
<script>
/* ================= 常數 ================= */
const WARRANTY_YEARS = 2;      // 保固年限（Demo 預設 2 年）
const INSPECT_FEE = 300;       // 過保送檢費+檢測費
const SHIP_FEE = 200;          // 寄件運費

const OFFICES = {
  north:  { name: '北部維修部門／辦事處', addr: '台北市內湖區瑞光路 123 號 5 樓' },
  central:{ name: '中部辦事處',           addr: '台中市西屯區台灣大道二段 456 號' },
  south:  { name: '南部辦事處',           addr: '高雄市前鎮區中山二路 789 號' },
};
const WH_LABEL = { north:'北部', central:'中部', south:'南部' };
const WHS = ['north','central','south'];

const ROLES = {
  customer:'客戶', sales:'業務', receiver:'收件/點收人員',
  tech:'維修人員', stock:'控存人員', finance:'核帳/財務人員',
};
const ROLE_TABS = {
  customer:['repairNew','shop','orders','notifs'],
  sales:   ['repairNew','shop','orders','notifs'],
  receiver:['receive','handover','overview','notifs'],
  tech:    ['work','handover','overview','notifs'],
  stock:   ['scan','inv','review','pricing','txns','overview','notifs'],
  finance: ['recon','overview','notifs'],
};
const TAB_LABELS = {
  repairNew:'維修申請', shop:'配件商城', orders:'我的訂單', notifs:'通知',
  receive:'收件點收', handover:'取件／寄送作業', overview:'流程總覽',
  work:'維修工作台', inv:'庫存管理', review:'收單／預購審查',
  pricing:'價目表維護', txns:'異動記錄', recon:'對帳作業', scan:'📷 掃碼作業',
};

const PERSONA = {
  customer:{ name:'王小明', phone:'0912-345-678', addr:'台北市大安區和平東路一段 100 號' },
  sales:   { name:'李佳玲（業務）', phone:'0987-654-321', addr:'台中市北區進化路 50 號' },
};

/* 全局價目表主資料：biz=業務價 cust=客戶價 null=待補 / bizOnly=業務專用 */
const CATALOG = [
  { id:'p1',  name:'圓刷',              biz:950,   cust:950,   repair:true, sale:true },
  { id:'p2',  name:'地板刷',            biz:950,   cust:950,   repair:true, sale:true },
  { id:'p3',  name:'機器濾網',          biz:300,   cust:450,   repair:true, sale:true },
  { id:'p4',  name:'T型刷',             biz:350,   cust:350,   repair:true, sale:true },
  { id:'p5',  name:'遙控器',            biz:2700,  cust:2700,  repair:true, sale:true },
  { id:'p6',  name:'噴氣頭',            biz:250,   cust:250,   repair:true, sale:true },
  { id:'p7',  name:'細縫刷',            biz:500,   cust:500,   repair:true, sale:true },
  { id:'p8',  name:'機器背蓋',          biz:500,   cust:900,   repair:true },
  { id:'p9',  name:'機器水盆',          biz:3000,  cust:3000,  repair:true },
  { id:'p10', name:'主機刷子',          biz:250,   cust:250,   repair:true },
  { id:'p11', name:'拍打頭接觸線',      biz:1200,  cust:1200,  repair:true },
  { id:'p12', name:'大噴瓶',            biz:400,   cust:400,   repair:true, sale:true },
  { id:'p13', name:'帶電軟管(不含遙控器)', biz:9000, cust:9000, repair:true, note:'二手價 $6,300' },
  { id:'p14', name:'帶電軟管(含遙控器)',  biz:12000, cust:12000, repair:true },
  { id:'p15', name:'捲線器',            biz:1800,  cust:1800,  repair:true },
  { id:'p16', name:'附輪底座',          biz:null,  cust:null,  repair:true, tbd:true },
  { id:'p17', name:'鋼管(一支)',        biz:null,  cust:null,  repair:true, tbd:true },
  { id:'p20', name:'觸控面板',          biz:null,  cust:null,  repair:true, tbd:true },
  { id:'p21', name:'膠條',              biz:null,  cust:null,  repair:true, tbd:true },
  { id:'p22', name:'原廠消毒水',        biz:350,   cust:400,   sale:true },
  { id:'p23', name:'制服',              biz:600,   cust:null,  sale:true, bizOnly:true },
  { id:'p24', name:'手電筒',            biz:350,   cust:null,  sale:true, bizOnly:true },
  { id:'p25', name:'紙本單',            biz:500,   cust:null,  sale:true, bizOnly:true },
  { id:'p26', name:'寵物包',            biz:1800,  cust:null,  sale:true, bizOnly:true },
  { id:'p27', name:'雨罩',              biz:200,   cust:null,  sale:true, bizOnly:true },
  { id:'p28', name:'萊潔消毒水',        biz:170,   cust:null,  sale:true, bizOnly:true },
  { id:'p29', name:'名片',              biz:340,   cust:null,  sale:true, bizOnly:true },
];

/* 階段1 維修項目勾選清單（主機/拍打頭需填型號） */
const REPAIR_ITEMS = ['主機','拍打頭','圓刷','地板刷','機器濾網','T型刷','遙控器','噴氣頭','細縫刷',
  '機器背蓋','機器水盆','主機刷子','拍打頭接觸線','大噴瓶','帶電軟管(不含遙控器)','帶電軟管(含遙控器)',
  '捲線器','附輪底座','鋼管(一支)','觸控面板','膠條'];

const RSTATUS = {
  submitted: ['待收件','b-blue'],   received: ['維修檢測中','b-purple'],
  quoted:    ['已報價待回覆','b-amber'], paid: ['待對帳','b-purple'],
  reconciled:['待取件／寄送','b-teal'],  closed: ['已結案','b-green'],
};
const SSTATUS = {
  pending_payment:['待付款','b-amber'], pending_recon:['待對帳','b-purple'],
  pending_stock: ['待收單備貨','b-blue'], ready:['備貨完成','b-teal'], closed:['已結案','b-green'],
};
const RSTEPS = ['申請送件','收件點收','檢測維修','發送報價','付款/取件方式','對帳結案'];
const SSTEPS = ['線上下單','完成付款','對帳確認','收單備貨','完成'];
const RDONE = { submitted:1, received:2, quoted:4, paid:5, reconciled:5, closed:6 };
const SDONE = { pending_payment:1, pending_recon:2, pending_stock:3, ready:4, closed:5 };
const R_ACTOR = { submitted:'收件/點收人員', received:'維修人員', quoted:'客戶/業務',
  paid:'核帳/財務人員', reconciled:'點收/維修人員', closed:'—' };
const S_ACTOR = { pending_payment:'客戶/業務', pending_recon:'核帳/財務人員',
  pending_stock:'控存人員', ready:'控存人員(結案)', closed:'—' };

const UNI_STYLES = ['舊款男版','舊款女版','備用版圓領T','新版通用版'];
const UNI_SIZES  = ['XS','S','M','L','XL','2XL','3XL'];

/* ================= 狀態 ================= */
const LS_KEY = 'baojie_demo_v1';
let state = null;
let cart = []; // 購物車（不落地）

function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function load(){
  try{ const s = localStorage.getItem(LS_KEY); if(s){ state = JSON.parse(s); migrate(); return true; } }catch(e){}
  return false;
}
/* 舊版 localStorage 資料補上新欄位（條碼／自訂品項） */
function migrate(){
  if(!state.barcodes) state.barcodes = defaultBarcodes();
  if(!state.customItems) state.customItems = [];
  if(state.seq.c == null) state.seq.c = 0;
  if(!state.machineReg) state.machineReg = seedMachines();
}
function defaultBarcodes(){
  const b = {};
  CATALOG.forEach((c,i)=>{ b[codeForIndex(i)] = c.id; });
  return b;
}
function resetDemo(){
  if(!confirm('確定要清除所有操作、恢復示範初始資料？')) return;
  localStorage.removeItem(LS_KEY); location.reload();
}

/* ================= 工具 ================= */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ return '$' + Number(n||0).toLocaleString(); }
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayISO(){ return iso(new Date()); }
function addMonths(d, m){ const x = new Date(d); x.setMonth(x.getMonth()+m); return x; }
function fmtDate(s){ return s ? s.replace(/-/g,'/') : '—'; }
function fmtDT(ts){ const d = new Date(ts); return iso(d).replace(/-/g,'/') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function toast(msg){ const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2600); }

function warranty(shipDate){
  if(!shipDate) return null;
  const end = new Date(shipDate); end.setFullYear(end.getFullYear() + WARRANTY_YEARS);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.floor((now - end) / 86400000);
  return { inW: diff <= 0, end: iso(end), overdue: diff > 0 ? diff : 0 };
}
function wBadge(w){
  if(!w) return '<span class="badge b-gray">未填出貨日期</span>';
  return w.inW
    ? `<span class="badge b-green">🟢 保固內（至 ${fmtDate(w.end)}）</span>`
    : `<span class="badge b-red">🔴 已過保（過期 ${w.overdue} 天）</span>`;
}
function cat(id){ return CATALOG.find(c=>c.id===id) || (state && state.customItems || []).find(c=>c.id===id); }
function allItems(){ return CATALOG.concat(state.customItems || []); }
function kindOf(role){ return role==='sales' ? 'biz' : 'cust'; }
function price(id, kind){ const p = state.pricing[id]; return p ? p[kind] : null; }

function partTotals(id){
  const e = state.inv.parts[id]; if(!e) return {q:0,s:0};
  let q=0,s=0; WHS.forEach(w=>{ q+=e[w].q; s+=e[w].s; });
  return {q,s};
}
function frontStatus(id){ const t = partTotals(id); return t.q > t.s ? '現貨' : '預購'; }
function fsBadge(id){ return frontStatus(id)==='現貨' ? '<span class="badge b-green">現貨</span>' : '<span class="badge b-amber">預購</span>'; }

/* ================= 通知 ================= */
function notify(roles, title, body, ref){
  state.notifs.unshift({ id:'n'+(++state.seq.n), ts:Date.now(), roles, title, body, ref:ref||null, read:false });
}
function unreadCount(){ return state.notifs.filter(n=>n.roles.includes(state.role) && !n.read).length; }
function openRef(ref){
  if(!ref) return;
  if(ref[0]==='R' && state.repairs.find(r=>r.id===ref)) openRepair(ref);
  else if(ref[0]==='S' && state.sales.find(s=>s.id===ref)) openSale(ref);
}

/* ================= 庫存異動核心 ================= */
function logTxn(type, item, wh, delta, staff, ref, note){
  state.txns.unshift({ ts:Date.now(), type, item, wh, delta, staff:staff||'—', ref:ref||'', note:note||'' });
}
function adjustPart(id, wh, delta, type, staff, ref, note){

}

function render(){
  if(typeof window.__scanActive === 'function') window.__scanActive(); // 離開掃碼頁時關閉相機
  const sel = $('roleSel');
  sel.innerHTML = Object.entries(ROLES).map(([k,v])=>`<option value="${k}" ${state.role===k?'selected':''}>${v}</option>`).join('');
  const tabs = ROLE_TABS[state.role];
  if(!tabs.includes(state.tab)) state.tab = tabs[0];
  $('tabs').innerHTML = tabs.map(t=>{
    const extra = t==='notifs' && unreadCount()>0 ? ` (${unreadCount()})` : '';
    return `<div class="tab ${state.tab===t?'on':''}" onclick="setTab('${t}')">${TAB_LABELS[t]}${extra}</div>`;
  }).join('');
  const V = {
    repairNew:vRepairNew, shop:vShop, orders:vOrders, notifs:vNotifs,
    receive:vReceive, handover:vHandover, overview:vOverview, work:vWork,
    inv:vInventory, review:vReview, pricing:vPricing, txns:vTxns, recon:vRecon, scan:vScan,
  };
  $('view').innerHTML = (V[state.tab]||vOverview)();
  const c = unreadCount();
  $('bellCnt').style.display = c>0 ? 'inline-block' : 'none';
  $('bellCnt').textContent = c;
}

function submitRepair(){
  const name = $('rq_name').value.trim(), phone = $('rq_phone').value.trim(), ship = $('rq_ship').value;
  if(!name || !phone) return toast('請填寫姓名與電話');
  if(!ship) return toast('請填寫出貨日期（判斷保固用）');
  const items = [], models = {};
  REPAIR_ITEMS.forEach((it,i)=>{
    if($('rq_it'+i).checked){ items.push(it); const m = $('rq_md'+i); if(m && m.value.trim()) models[it] = m.value.trim(); }
  });
  if(!items.length) return toast('請至少勾選一項維修項目');
  const dm = document.querySelector('input[name=rq_dm]:checked')?.value;
  if(!dm) return toast('請選擇送件方式');
  const delivery = { method:dm };
  if(dm==='office') delivery.office = document.querySelector('input[name=rq_off]:checked')?.value || 'central';
  if(dm==='courier'){
    delivery.courierCo = $('rq_cco').value.trim(); delivery.trackingNo = $('rq_ctn').value.trim();
    if(!delivery.courierCo || !delivery.trackingNo) return toast('貨運寄件請填寫物流公司與單號');
  }
  const w = warranty(ship);
  let owAgreed = false;
  if(!w.inW){
    if(!$('rq_ow') || !$('rq_ow').checked) return toast('⚠️ 已過保固：須勾選「同意支付 300 元檢測費」方可送出');
    owAgreed = true;
  }
  const files = [...($('rq_file').files||[])].map(f=>f.name);
  const id = 'R-' + String(++state.seq.r).padStart(3,'0');
  state.repairs.unshift({
    id, createdAt:Date.now(), byRole:state.role,
    customer:{ name, phone, addr:$('rq_addr').value.trim() },
    orderNo:$('rq_orderNo').value.trim(), shipDate:ship,
    items, models, issue:$('rq_issue').value.trim(), attachments:files,
    delivery, owAgreed, status:'submitted',
  });
  notify(['receiver'], `📥 新維修申請單 ${id}`, `${name} 送出維修申請，請於物件到貨後點收。`, id);
  save(); toast('✅ 維修申請已送出：' + id);
  state.tab = 'orders'; render(); openRepair(id);
}

function addToCart(id){
  const q = Math.max(1, parseInt($('qty_'+id).value)||1);
  const ex = cart.find(x=>x.id===id);
  if(ex) ex.qty = q; else cart.push({ id, qty:q });
  toast('已加入購物車'); render();
}
function rmCart(id){ cart = cart.filter(x=>x.id!==id); render(); }
function cartTotal(){ const k = kindOf(state.role); return cart.reduce((t,x)=>t+price(x.id,k)*x.qty, 0); }
function ckUI(){
  const v = document.querySelector('input[name=ck_dm]:checked')?.value;
  let h = '';
  if(v==='pickup') h = `<div class="infobox">自取地點：
    <label class="opt"><input type="radio" name="ck_off" value="north" checked> ${OFFICES.north.name}（${OFFICES.north.addr}）</label>

  if(v==='ship') h = `<div class="infobox flexrow">寄送方式：<select id="ck_via"><option>貨運</option><option>郵局</option></select>
    收件地址：<input id="ck_shipaddr" value="${esc($('ck_addr').value)}" style="width:280px"></div>`;
  $('ckBox').innerHTML = h;
  $('ckTotal').textContent = v==='ship' ? `　＋運費 ${money(SHIP_FEE)} ＝ 總計 ${money(cartTotal()+SHIP_FEE)}` : `　＝ 總計 ${money(cartTotal())}`;

function checkout(){
  if(!cart.length) return;
  const name = $('ck_name').value.trim(), phone = $('ck_phone').value.trim();
  if(!name || !phone) return toast('請填寫購買人姓名與電話');
  const dm = document.querySelector('input[name=ck_dm]:checked')?.value;
  if(!dm) return toast('請選擇取件方式');
  const k = kindOf(state.role);
  const delivery = { method:dm };
  let shipFee = 0;
  if(dm==='pickup') delivery.office = document.querySelector('input[name=ck_off]:checked')?.value || 'north';
  else {
    delivery.shipVia = $('ck_via').value; delivery.addr = $('ck_shipaddr').value.trim();
    if(!delivery.addr) return toast('請填寫收件地址');
    shipFee = SHIP_FEE;
  }
  const items = cart.map(x=>({ id:x.id, qty:x.qty, unit:price(x.id,k), front:frontStatus(x.id) }));
  const id = 'S-' + String(++state.seq.s).padStart(3,'0');
  state.sales.unshift({
    id, createdAt:Date.now(), byRole:state.role,
    buyer:{ name, phone, addr:$('ck_addr').value.trim() },
    items, delivery, shipFee,
    total: items.reduce((t,i)=>t+i.unit*i.qty,0)+shipFee,
    status:'pending_payment',
  });
  cart = []; save(); toast('✅ 訂單已成立：'+id+'，請完成付款');
  state.tab = 'orders'; render(); openSale(id);
}

      <div class="field"><span>更換項目（勾選自動帶出庫存量與${kind==='biz'?'業務':'客戶'}維修金額）</span>
      <table><thead><tr><th></th><th>零件</th><th>北部庫存</th><th>單價</th><th>數量</th>${w.inW?'<th>人為損壞</th>':''}<th class="right">計價</th></tr></thead><tbody>
      ${CATALOG.filter(c=>c.repair).map(c=>{
        const u = price(c.id, kind);
        const stk = state.inv.parts[c.id].north.q;
        return `<tr>
          <td><input type="checkbox" id="wp_${c.id}" ${u==null?'disabled':''} onchange="workPrev('${r.id}')"></td>
          <td>${c.name}${c.note?`<div class="note">${c.note}</div>`:''}</td>
          <td class="${stk<=state.inv.parts[c.id].north.s?'low':''}">${stk}</td>
          <td>${u==null?'<span class="badge b-red">待補價格</span> <span class="note">請至價目表維護</span>':money(u)}</td>
          <td><input type="number" id="wq_${c.id}" value="1" min="1" max="9" style="width:56px;padding:4px 6px" onchange="workPrev('${r.id}')"></td>
          ${w.inW?`<td><input type="checkbox" id="wh_${c.id}" onchange="workPrev('${r.id}')"></td>`:''}
          <td class="right" id="wc_${c.id}">—</td>
        </tr>`;
      }).join('')}
      </tbody></table></div>
      <div class="right" style="font-size:15px"><b id="wtotal">報價合計 ${money(w.inW?0:INSPECT_FEE)}</b></div>
      <div class="field"><span>維修報告 *（客戶/業務可見）</span><textarea id="wk_report" placeholder="檢測結果與維修說明…"></textarea></div>
      <div class="field"><span>照片或影片附件</span><input type="file" id="wk_file" multiple></div>
      <div class="field"><span>其它內部記錄備註 🔒（僅內部可視）</span><textarea id="wk_note" placeholder="內部備註，客戶/業務不可見…"></textarea></div>
      <button class="btn" onclick="submitWork('${r.id}')">提交維修報告，發送報價單（階段 4）</button>`;
    } else h += `<p class="note">等待「維修人員」拆機檢測。（請切換角色操作）</p>`;
    h += `</div>`;
  }

  /* 階段 4+5：報價單與客戶回覆 */
  if(r.quote){
    h += `<div class="sec"><h4>📄 電子報價單（階段 4・系統自動生成並已透過 Email/LINE 通知）</h4>
    <table><thead><tr><th>項目</th><th>數量</th><th>單價</th><th class="right">小計</th></tr></thead><tbody>
    ${r.quote.lines.map(l=>`<tr><td>${esc(l.name)}${l.waived?' <span class="badge b-green">保固內免費</span>':''}</td><td>${l.qty}</td><td>${money(l.unit)}</td><td class="right">${l.waived?money(0):money(l.sub)}</td></tr>`).join('')}
    ${r.quote.fee?`<tr><td>基本送檢費及檢測費（過保）</td><td>1</td><td>${money(r.quote.fee)}</td><td class="right">${money(r.quote.fee)}</td></tr>`:''}
    <tr><td colspan="3"><b>合計</b></td><td class="right"><b>${money(r.quote.total)}</b></td></tr>
    </tbody></table>
    <p class="note">發送時間：${fmtDT(r.quote.sentAt)}</p></div>`;
  }

  if(r.status==='quoted'){
    h += `<div class="sec"><h4>✅ 維修意願確認與付款（階段 5）</h4>`;
    if(isOrderer){
      const fee = (w && !w.inW) ? INSPECT_FEE : 0;
      h += `<div>
        <label class="opt"><input type="radio" name="dc_d" value="agree" onchange="decUI('${r.id}')"> <b>【同意維修】</b>（應付 ${money(r.quote.total)}）</label>
        <label class="opt"><input type="radio" name="dc_d" value="abandon" onchange="decUI('${r.id}')"> <b>【放棄維修】</b>${fee?`（過保仍需支付檢測費 ${money(fee)}）`:'（保固內，無需費用）'}</label>
      </div>
      <div id="dcPay"></div>
      <h4>取件方式</h4>
      <label class="opt"><input type="radio" name="dc_pk" value="north" onchange="decPkUI()"> 北部維修部門自取</label>
      <label class="opt"><input type="radio" name="dc_pk" value="office" onchange="decPkUI()"> 就近辦事處自取</label>
      <label class="opt"><input type="radio" name="dc_pk" value="courier" onchange="decPkUI()"> 貨運寄件</label>
      <div id="dcPkBox"></div>
      <div class="mt"><button class="btn green" onclick="submitDecision('${r.id}')">送出回覆</button></div>`;
    } else h += `<p class="note">等待「客戶／業務」回覆維修意願與付款。（請切換角色操作）</p>`;
    h += `</div>`;
  }

  if(r.decision){
    h += `<div class="sec"><h4>💳 客戶回覆（階段 5）</h4><div class="kv">
      <b>維修意願</b>${r.decision==='agree'?'同意維修':'放棄維修'}　<b>應付金額</b>${money(r.payAmount||0)}<br>
      <b>付款資訊</b>${payText(r.payment)}<br>
      <b>取件方式</b>${pickupText(r.pickup)}</div></div>`;
  }

  /* 階段 6：對帳 */
  if(r.status==='paid'){
    h += `<div class="sec"><h4>💰 財務對帳（階段 6）</h4>`;
    if(state.role==='finance'){
      h += `<div class="grid2">
        <div class="field"><span>核帳人員姓名 *</span><input id="fn_staff" placeholder="請輸入姓名" style="width:100%"></div>
        <div class="field"><span>發票開立日期</span><input type="date" id="fn_ivd" value="${todayISO()}" style="width:100%"></div>
        <div class="field"><span>發票號碼</span><input id="fn_ivn" placeholder="AB-12345678" style="width:100%"></div>
      </div>
      <label class="opt"><input type="checkbox" id="fn_ok"> <b>確認核帳</b>（金流已核對無誤）</label>
      <div class="mt"><button class="btn" onclick="doReconRepair('${r.id}')">完成對帳</button></div>
      <p class="note">發票隨物品一起交件。</p>`;
    } else h += `<p class="note">等待「核帳/財務人員」對帳確認。（請切換角色操作）</p>`;
    h += `</div>`;
  }
  if(r.account){
    h += `<div class="sec"><h4>🧾 核帳記錄</h4><div class="kv">
      <b>核帳人員</b>${esc(r.account.staff)}　<b>核帳時間</b>${fmtDT(r.account.ts)}<br>
      <b>發票</b>${r.account.ivn?`${fmtDate(r.account.ivd)}／${esc(r.account.ivn)}（隨物品交件）`:'未開立'}</div></div>`;
  }

  /* 階段 6：取件/寄送 */
  if(r.status==='reconciled'){
    h += `<div class="sec"><h4>📦 通知取件／寄出結案（階段 6）</h4>`;
    if(state.role==='receiver' || state.role==='tech'){
      if(r.pickup && r.pickup.method==='courier'){
        h += `<div class="grid2">
          <div class="field"><span>物流公司 *</span><input id="cl_cco" placeholder="如：黑貓宅急便" style="width:100%"></div>
          <div class="field"><span>物流單號 *</span><input id="cl_ctn" placeholder="單號" style="width:100%"></div>
        </div>
        <button class="btn green" onclick="closeRepair('${r.id}','courier')">寄出並自動結案（扣減庫存）</button>`;
      } else {
        h += `${r.notice?`<div class="okbox">已通知客戶可取件：${esc(r.notice.time)}／點交人員 ${esc(r.notice.staff)}</div>`:''}
        <div class="grid2">
          <div class="field"><span>可取件時間 *</span><input type="datetime-local" id="cl_time" style="width:100%" value="${r.notice?r.notice.raw:''}"></div>
          <div class="field"><span>點交人員姓名 *</span><input id="cl_staff" style="width:100%" value="${r.notice?esc(r.notice.staff):''}"></div>
        </div>
        <div class="flexrow">
          ${r.notice?'':`<button class="btn" onclick="sendPickupNotice('${r.id}')">通知客戶取件時間</button>`}
          <button class="btn green" onclick="closeRepair('${r.id}','pickup')">完成點交，結案（扣減庫存）</button>
        </div>`;
      }
    } else h += `<p class="note">等待「點收／維修人員」安排取件或寄出。取件方式：${pickupText(r.pickup)}</p>`;
    h += `</div>`;
  }
  if(r.status==='closed'){
    h += `<div class="sec"><div class="okbox"><b>✅ 已結案</b>　${fmtDT(r.closedAt)}<br>
      ${r.shipOut?`貨運寄出：${esc(r.shipOut.co)}／${esc(r.shipOut.no)}`:`點交完成：${esc(r.notice?r.notice.staff:'—')}${r.notice?'／'+esc(r.notice.time):''}`}
      ${r.decision==='agree'&&r.repair&&r.repair.parts.length?`<br>庫存已自動扣減：${r.repair.parts.map(p=>cat(p.id).name+'×'+p.qty).join('、')}（北部倉，流水帳含維修單號 ${r.id}）`:''}
    </div></div>`;
  }
  return h;
}

/* ============== 階段動作 ============== */
function doReceive(id){
  const r = state.repairs.find(x=>x.id===id);
  const date = $('rc_date').value, staff = $('rc_staff').value.trim();
  if(!date || !staff) return toast('請填寫收件日期與點收人員姓名');
  const missing = r.items.filter((_,i)=>!$('rc_it'+i).checked);
  if(missing.length) return toast('⚠️ 防呆：尚未逐項對點完成（'+missing.join('、')+'）');
  r.receive = { date, staff, checked:[...r.items] };
  r.status = 'received';
  notify(['tech'], `🔧 ${id} 已完成收件`, `點收人員 ${staff} 已完成對點，請進行拆機檢測。`, id);
  notify([r.byRole], `📦 ${id} 已收到您的物件`, `我們已於 ${fmtDate(date)} 完成收件點收，進入檢測程序。`, id);
  save(); toast('✅ 收件完成'); render(); refreshModal();
}

function workPrev(rid){
  const r = state.repairs.find(x=>x.id===rid);
  const w = warranty(r.shipDate), kind = kindOf(r.byRole);
  let total = w.inW ? 0 : INSPECT_FEE;
  CATALOG.filter(c=>c.repair).forEach(c=>{
    const cell = $('wc_'+c.id); if(!cell) return;
    const chk = $('wp_'+c.id);
    if(chk && chk.checked){
      const qty = Math.max(1, parseInt($('wq_'+c.id).value)||1);
      const human = w.inW ? ($('wh_'+c.id)?.checked||false) : true;
      const u = price(c.id, kind)||0;
      const charged = (w.inW && !human) ? 0 : u*qty;
      cell.innerHTML = charged===0 ? '<span class="badge b-green">$0 保固</span>' : money(charged);
      total += charged;
    } else cell.textContent = '—';
  });
  $('wtotal').textContent = '報價合計 ' + money(total);
}

function submitWork(rid){
  const r = state.repairs.find(x=>x.id===rid);
  const date = $('wk_date').value, staff = $('wk_staff').value.trim(), report = $('wk_report').value.trim();
  if(!date || !staff) return toast('請填寫維修日期與維修人員');
  if(!report) return toast('請填寫維修報告（將附在報價單上）');
  const w = warranty(r.shipDate), kind = kindOf(r.byRole);
  const parts = [], lines = [];
  CATALOG.filter(c=>c.repair).forEach(c=>{
    const chk = $('wp_'+c.id);
    if(chk && chk.checked){
      const qty = Math.max(1, parseInt($('wq_'+c.id).value)||1);
      const human = w.inW ? ($('wh_'+c.id)?.checked||false) : true;
      const u = price(c.id, kind)||0;
      const waived = w.inW && !human;
      parts.push({ id:c.id, qty, human, unit:u, charged: waived?0:u*qty });
      lines.push({ name:c.name, qty, unit:u, sub:u*qty, waived });
    }
  });
  const fee = w.inW ? 0 : INSPECT_FEE;
  const total = parts.reduce((t,p)=>t+p.charged,0) + fee;
  r.repair = { date, staff, parts, report,
    attachments:[...($('wk_file').files||[])].map(f=>f.name),
    internalNote: $('wk_note').value.trim() };
  r.quote = { lines, fee, total, sentAt:Date.now() };
  r.status = 'quoted';
  notify([r.byRole], `📄 ${rid} 報價單已發送（Email/LINE）`, `維修報價 ${money(total)}，請確認是否同意維修並回覆取件方式。`, rid);
  save(); toast('✅ 維修報告已提交，系統已自動發送報價單（階段 4）'); render(); refreshModal();
}

/* 階段 5 UI */

  const d = document.querySelector('input[name=dc_d]:checked')?.value;

    <div class="mt flexrow">
      <label class="opt"><input type="radio" name="dc_pm" value="linepay" checked onchange="decPayUI()"> LinePay QRcode</label>
      <label class="opt"><input type="radio" name="dc_pm" value="bank" onchange="decPayUI()"> 匯款帳號</label>
    </div>
    <div id="dcPmBox" class="mt flexrow">${QR_SVG}<div class="note">請掃描 QRcode 完成 LinePay 付款（Demo 示意）</div></div>
    <div class="grid2 mt">
      <div class="field"><span>付款日期 *</span><input type="date" id="dc_pd" value="${todayISO()}" style="width:100%"></div>
      <div class="field"><span id="dcRefLbl">LinePay 編號 *</span><input id="dc_ref" style="width:100%"></div>
      <div class="field"><span>上傳交易截圖</span><input type="file" id="dc_shot"></div>
    </div>
    <div class="field"><span>發票是否開立統編</span>
      <label class="opt"><input type="radio" name="dc_iv" value="n" checked onchange="$('dc_tax').style.display='none'"> 否</label>
      <label class="opt"><input type="radio" name="dc_iv" value="y" onchange="$('dc_tax').style.display='inline-block'"> 是</label>
      <input id="dc_tax" placeholder="統編號碼" style="display:none;width:140px">
    </div></div>` : `<div class="okbox mt">保固內免費／放棄免費：無需付款，直接選擇取件方式。</div>`;
}
function decPayUI(){
  const m = document.querySelector('input[name=dc_pm]:checked')?.value;
  $('dcPmBox').innerHTML = m==='linepay'
    ? `${QR_SVG}<div class="note">請掃描 QRcode 完成 LinePay 付款（Demo 示意）</div>`
    : `<div class="infobox">匯款帳號：808 玉山銀行　1234-567-890123<br><span class="note">戶名：寶傑股份有限公司</span></div>`;
  $('dcRefLbl').textContent = m==='linepay' ? 'LinePay 編號 *' : '轉帳後五碼 *';
}
function decPkUI(){
  const v = document.querySelector('input[name=dc_pk]:checked')?.value;
  let h = '';
  if(v==='north') h = `<div class="infobox">📍 ${OFFICES.north.name}：${OFFICES.north.addr}</div>`;
  if(v==='office') h = `<div class="infobox">
    <label class="opt"><input type="radio" name="dc_off" value="central" checked> ${OFFICES.central.name}（${OFFICES.central.addr}）</label>
    <label class="opt"><input type="radio" name="dc_off" value="south"> ${OFFICES.south.name}（${OFFICES.south.addr}）</label></div>`;
  if(v==='courier') h = `<div class="infobox">收件地址：<input id="dc_pkaddr" style="width:300px"></div>`;
  $('dcPkBox').innerHTML = h;
}
function submitDecision(rid){
  const r = state.repairs.find(x=>x.id===rid);
  const w = warranty(r.shipDate);
  const d = document.querySelector('input[name=dc_d]:checked')?.value;
  if(!d) return toast('請選擇【同意維修】或【放棄維修】');
  const pk = document.querySelector('input[name=dc_pk]:checked')?.value;
  if(!pk) return toast('請選擇取件方式');
  const pickup = { method:pk };
  if(pk==='office') pickup.office = document.querySelector('input[name=dc_off]:checked')?.value || 'central';
  if(pk==='courier'){ pickup.addr = $('dc_pkaddr').value.trim(); if(!pickup.addr) return toast('請填寫收件地址'); }
  const amt = d==='agree' ? r.quote.total : ((w && !w.inW) ? INSPECT_FEE : 0);
  r.decision = d; r.pickup = pickup; r.payAmount = amt;
  if(amt>0){
    const pm = document.querySelector('input[name=dc_pm]:checked')?.value || 'linepay';
    const ref = $('dc_ref').value.trim();
    if(!$('dc_pd').value || !ref) return toast('請回填付款日期與'+(pm==='linepay'?'LinePay 編號':'轉帳後五碼'));
    const ivNeed = document.querySelector('input[name=dc_iv]:checked')?.value==='y';
    if(ivNeed && !$('dc_tax').value.trim()) return toast('請填寫統編號碼');
    r.payment = { method:pm, date:$('dc_pd').value, ref,
      shot: $('dc_shot').files[0]?.name || '', invoice:{ need:ivNeed, taxId:$('dc_tax').value.trim() } };
    r.status = 'paid';
    notify(['finance'], `💰 ${rid} 已回填付款資訊`, `${d==='agree'?'同意維修':'放棄維修（檢測費）'} ${money(amt)}，請對帳確認。`, rid);
    toast('✅ 已送出，等待財務對帳');
  } else {
    r.status = 'reconciled';
    notify(['receiver','tech'], `📦 ${rid} 可安排取件／寄送`, `客戶已回覆（${d==='agree'?'同意維修':'放棄維修'}，免付款），請安排交件。`, rid);
    toast('✅ 已送出，等待安排取件');
  }
  save(); render(); refreshModal();
}

function doReconRepair(id){
  const r = state.repairs.find(x=>x.id===id);
  const staff = $('fn_staff').value.trim();
  if(!staff) return toast('請填寫核帳人員姓名');
  if(!$('fn_ok').checked) return toast('⚠️ 防呆：請勾選「確認核帳」');
  r.account = { staff, ts:Date.now(), ivd:$('fn_ivd').value, ivn:$('fn_ivn').value.trim() };
  r.status = 'reconciled';
  notify(['receiver','tech'], `📦 ${id} 對帳完成`, `請依取件方式安排：${pickupText(r.pickup)}`, id);
  notify([r.byRole], `✅ ${id} 對帳完成`, `款項已確認，將盡快安排${r.pickup.method==='courier'?'寄出':'取件'}。`, id);
  save(); toast('✅ 對帳完成'); render(); refreshModal();
}

function sendPickupNotice(id){
  const r = state.repairs.find(x=>x.id===id);
  const t = $('cl_time').value, staff = $('cl_staff').value.trim();
  if(!t || !staff) return toast('請填寫可取件時間與點交人員姓名');
  r.notice = { raw:t, time:t.replace('T',' '), staff };
  const place = r.pickup.method==='north' ? OFFICES.north : OFFICES[r.pickup.office];
  notify([r.byRole], `🔔 ${id} 可取件通知`, `請於 ${r.notice.time} 至 ${place.name}（${place.addr}）取件，點交人員：${staff}。發票隨物品交件。`, id);
  save(); toast('✅ 已通知客戶取件時間'); render(); refreshModal();
}

function closeRepair(id, mode){
  const r = state.repairs.find(x=>x.id===id);
  if(mode==='courier'){
    const co = $('cl_cco').value.trim(), no = $('cl_ctn').value.trim();
    if(!co || !no) return toast('請填寫物流公司與物流單號');
    r.shipOut = { co, no };
    notify([r.byRole], `🚚 ${id} 已寄出`, `${co}／${no}，維修單已結案。`, id);
  } else {
    const staff = ($('cl_staff')?.value||'').trim() || (r.notice?r.notice.staff:'');
    if(!staff) return toast('請填寫點交人員姓名');
    if(!r.notice){ const t = $('cl_time').value; if(t) r.notice = { raw:t, time:t.replace('T',' '), staff }; else r.notice = { raw:'', time:'現場點交', staff }; }
    r.notice.staff = staff;
    notify([r.byRole], `✅ ${id} 點交完成`, `維修單已結案，感謝您的支持。`, id);
  }
  /* 結案：正式扣減分倉庫存（同意維修才消耗零件） */
  if(r.decision==='agree' && r.repair){
    r.repair.parts.forEach(p=>{
      adjustPart(p.id, 'north', -p.qty, '維修消耗', r.repair.staff, r.id, '維修零件出庫');
    });
  }
  r.status = 'closed'; r.closedAt = Date.now();
  save(); toast('✅ ' + id + ' 已結案' + (r.decision==='agree'?'，庫存已自動扣減':'')); render(); refreshModal();
}

/* ============== 販售單詳情 ============== */
function saleDeliveryText(d){
  if(d.method==='pickup') return `${OFFICES[d.office].name}自取（${OFFICES[d.office].addr}）`;
  return `${esc(d.shipVia)}寄件（收件地址：${esc(d.addr)}，運費 ${money(SHIP_FEE)}）`;
}
function saleDetailHTML(s){
  const [stTxt, stCls] = SSTATUS[s.status];
  const isOrderer = ['customer','sales'].includes(state.role);
  let h = `<h3>販售訂單 ${s.id} <span class="badge ${stCls}">${stTxt}</span></h3>
  ${stepperHTML(SSTEPS, SDONE[s.status])}
  <div class="sec"><h4>🛒 訂單內容（步驟 1）</h4><div class="kv">
    <b>購買人</b>${esc(s.buyer.name)}／${esc(s.buyer.phone)}（${ROLES[s.byRole]}）　<b>下單時間</b>${fmtDT(s.createdAt)}<br>
    <b>取件方式</b>${saleDeliveryText(s.delivery)}</div>
  <table><thead><tr><th>品項</th><th>下單時狀態</th><th>單價</th><th>數量</th><th class="right">小計</th></tr></thead><tbody>
    ${s.items.map(i=>`<tr><td>${cat(i.id).name}</td><td>${i.front==='預購'?'<span class="badge b-amber">預購</span>':'<span class="badge b-green">現貨</span>'}</td><td>${money(i.unit)}</td><td>${i.qty}</td><td class="right">${money(i.unit*i.qty)}</td></tr>`).join('')}
    ${s.shipFee?`<tr><td colspan="4">運費（貨運/郵局）</td><td class="right">${money(s.shipFee)}</td></tr>`:''}
    <tr><td colspan="4"><b>總計</b></td><td class="right"><b>${money(s.total)}</b></td></tr>
  </tbody></table></div>`;

  /* 步驟 2：付款 */
  if(s.status==='pending_payment'){
    h += `<div class="sec"><h4>💳 完成付款（步驟 2）</h4>`;
    if(isOrderer){
      h += `<div class="infobox"><b>應付金額 ${money(s.total)}</b>
      <div class="mt flexrow">
        <label class="opt"><input type="radio" name="sp_pm" value="linepay" checked onchange="spPayUI()"> LinePay QRcode</label>
        <label class="opt"><input type="radio" name="sp_pm" value="bank" onchange="spPayUI()"> 匯款帳號</label>
      </div>
      <div id="spPmBox" class="mt flexrow">${QR_SVG}<div class="note">請掃描 QRcode 完成 LinePay 付款（Demo 示意）</div></div>
      <div class="grid2 mt">
        <div class="field"><span>付款日期 *</span><input type="date" id="sp_pd" value="${todayISO()}" style="width:100%"></div>
        <div class="field"><span id="spRefLbl">LinePay 編號 *</span><input id="sp_ref" style="width:100%"></div>
        <div class="field"><span>上傳交易截圖</span><input type="file" id="sp_shot"></div>
      </div>
      <div class="field"><span>發票是否開立統編</span>
        <label class="opt"><input type="radio" name="sp_iv" value="n" checked onchange="$('sp_tax').style.display='none'"> 否</label>
        <label class="opt"><input type="radio" name="sp_iv" value="y" onchange="$('sp_tax').style.display='inline-block'"> 是</label>
        <input id="sp_tax" placeholder="統編號碼" style="display:none;width:140px">
      </div>
      <button class="btn green" onclick="paySale('${s.id}')">回填付款資訊</button></div>`;
    } else h += `<p class="note">等待「客戶／業務」完成付款。（請切換角色操作）</p>`;
    h += `</div>`;
  }
  if(s.payment){
    h += `<div class="sec"><h4>💳 付款資訊（步驟 2）</h4><div class="kv">${payText(s.payment)}</div></div>`;
  }

  /* 步驟 3：對帳 */
  if(s.status==='pending_recon'){
    h += `<div class="sec"><h4>💰 對帳確認（步驟 3）</h4>`;
    if(state.role==='finance'){
      h += `<div class="grid2">
        <div class="field"><span>核帳人員姓名 *</span><input id="sf_staff" style="width:100%"></div>
        <div class="field"><span>發票開立日期</span><input type="date" id="sf_ivd" value="${todayISO()}" style="width:100%"></div>
        <div class="field"><span>發票號碼</span><input id="sf_ivn" placeholder="AB-12345678" style="width:100%"></div>
      </div>
      <label class="opt"><input type="checkbox" id="sf_ok"> <b>確認核帳</b>（金流已核對無誤）</label>
      <div class="mt"><button class="btn" onclick="doReconSale('${s.id}')">完成對帳</button></div>`;
    } else h += `<p class="note">等待「核帳/財務人員」對帳。（請切換角色操作）</p>`;
    h += `</div>`;
  }
  if(s.account){
    h += `<div class="sec"><h4>🧾 核帳記錄</h4><div class="kv"><b>核帳人員</b>${esc(s.account.staff)}　<b>時間</b>${fmtDT(s.account.ts)}　<b>發票</b>${s.account.ivn?fmtDate(s.account.ivd)+'／'+esc(s.account.ivn):'未開立'}</div></div>`;
  }

  /* 步驟 4：控存收單備貨 */
  const hasPre = s.items.some(i=>frontStatus(i.id)==='預購' || i.front==='預購');
  if(s.status==='pending_stock'){
    h += `<div class="sec"><h4>📦 收單／預購審查（步驟 4）</h4>`;
    if(state.role==='stock'){
      h += hasPre ? `<div class="warnbox">⚠️ 本訂單含<b>預購</b>商品，請判斷是否補貨或向其它區域辦事處調貨後再確認收單。</div>` : `<div class="okbox">本訂單皆為現貨，庫存充足。</div>`;
      h += `<table><thead><tr><th>品項</th><th>需求</th><th>北部</th><th>中部</th><th>南部</th><th>前台狀態</th></tr></thead><tbody>
      ${s.items.map(i=>{
        const e = state.inv.parts[i.id];
        return `<tr><td>${cat(i.id).name}</td><td>${i.qty}</td>
          ${WHS.map(w=>`<td class="${e[w].q<=e[w].s?'low':''}">${e[w].q}<span class="note">/安${e[w].s}</span></td>`).join('')}
          <td>${fsBadge(i.id)}</td></tr>`;
      }).join('')}</tbody></table>
      <div class="grid2 mt">
        <div class="field"><span>控存人員姓名 *</span><input id="sr_staff" style="width:100%"></div>
        <div class="field"><span>庫存處置</span><select id="sr_act" style="width:100%">
          <option>庫存足夠，直接出貨</option><option>已安排補貨（向廠商進貨）</option>
          <option>已向中部辦事處調貨</option><option>已向南部辦事處調貨</option></select></div>
      </div>
      ${s.delivery.method==='ship' ? `<div class="grid2">
        <div class="field"><span>物流公司 *</span><input id="sr_cco" value="${esc(s.delivery.shipVia)}" style="width:100%"></div>
        <div class="field"><span>物流單號 *</span><input id="sr_ctn" style="width:100%"></div></div>`
      : `<div class="field"><span>可取件時間 *</span><input type="datetime-local" id="sr_time" style="width:100%"></div>`}
      <button class="btn green" onclick="doStockReview('${s.id}')">確認收單，備貨完成（扣庫存＋自動通知）</button>`;
    } else h += `<p class="note">等待「控存人員」收單備貨。（請切換角色操作）</p>`;
    h += `</div>`;
  }
  if(s.review){
    h += `<div class="sec"><h4>📦 備貨記錄（步驟 4-5）</h4><div class="kv">
      <b>控存人員</b>${esc(s.review.staff)}　<b>處置</b>${esc(s.review.act)}　<b>時間</b>${fmtDT(s.review.ts)}<br>
      ${s.shipOut?`<b>寄件</b>${esc(s.shipOut.co)}／${esc(s.shipOut.no)}`:`<b>可取件時間</b>${esc(s.pickupTime||'—')}`}<br>
      <b>庫存</b>已自動扣減（見異動記錄，含訂單編號 ${s.id}）</div></div>`;
  }
  if(s.status==='ready'){
    h += `<div class="sec"><div class="okbox">✅ 備貨完成，系統已自動發送${s.delivery.method==='ship'?'寄件':'自取'}通知。</div>
    ${state.role==='stock'?`<button class="btn" onclick="closeSale('${s.id}')">交件完成，結案</button>`:''}</div>`;
  }
  if(s.status==='closed'){
    h += `<div class="sec"><div class="okbox"><b>✅ 已結案</b>　${fmtDT(s.closedAt)}</div></div>`;
  }
  return h;
}

function spPayUI(){
  const m = document.querySelector('input[name=sp_pm]:checked')?.value;
  $('spPmBox').innerHTML = m==='linepay'
    ? `${QR_SVG}<div class="note">請掃描 QRcode 完成 LinePay 付款（Demo 示意）</div>`
    : `<div class="infobox">匯款帳號：808 玉山銀行　1234-567-890123<br><span class="note">戶名：寶傑股份有限公司</span></div>`;
  $('spRefLbl').textContent = m==='linepay' ? 'LinePay 編號 *' : '轉帳後五碼 *';
}
function paySale(id){
  const s = state.sales.find(x=>x.id===id);
  const pm = document.querySelector('input[name=sp_pm]:checked')?.value || 'linepay';
  const ref = $('sp_ref').value.trim();
  if(!$('sp_pd').value || !ref) return toast('請回填付款日期與'+(pm==='linepay'?'LinePay 編號':'轉帳後五碼'));
  const ivNeed = document.querySelector('input[name=sp_iv]:checked')?.value==='y';
  if(ivNeed && !$('sp_tax').value.trim()) return toast('請填寫統編號碼');
  s.payment = { method:pm, date:$('sp_pd').value, ref, shot:$('sp_shot').files[0]?.name||'', invoice:{ need:ivNeed, taxId:$('sp_tax').value.trim() } };
  s.status = 'pending_recon';
  notify(['finance'], `💰 ${id} 已回填付款資訊`, `販售訂單 ${money(s.total)}，請對帳確認。`, id);
  save(); toast('✅ 付款資訊已送出，等待財務對帳'); render(); refreshModal();
}
function doReconSale(id){
  const s = state.sales.find(x=>x.id===id);
  const staff = $('sf_staff').value.trim();
  if(!staff) return toast('請填寫核帳人員姓名');
  if(!$('sf_ok').checked) return toast('⚠️ 防呆：請勾選「確認核帳」');
  s.account = { staff, ts:Date.now(), ivd:$('sf_ivd').value, ivn:$('sf_ivn').value.trim() };
  s.status = 'pending_stock';
  const hasPre = s.items.some(i=>frontStatus(i.id)==='預購' || i.front==='預購');
  notify(['stock'], `📦 ${id} 對帳完成，請收單備貨`, hasPre?'⚠️ 本單含預購商品，請判斷補貨或跨區調撥。':'商品皆為現貨，請撿貨打包。', id);
  save(); toast('✅ 對帳完成，已通知控存收單'); render(); refreshModal();
}
function doStockReview(id){
  const s = state.sales.find(x=>x.id===id);
  const staff = $('sr_staff').value.trim();
  if(!staff) return toast('請填寫控存人員姓名');
  if(s.delivery.method==='ship'){
    const co = $('sr_cco').value.trim(), no = $('sr_ctn').value.trim();
    if(!co || !no) return toast('請填寫物流公司與物流單號');
    s.shipOut = { co, no };
  } else {
    const t = $('sr_time').value;
    if(!t) return toast('請填寫可取件時間');
    s.pickupTime = t.replace('T',' ');
  }
  s.review = { staff, act:$('sr_act').value, ts:Date.now() };
  /* 扣庫存：自取扣該辦事處倉，寄件扣北部倉 */
  const wh = s.delivery.method==='pickup' ? s.delivery.office : 'north';
  s.items.forEach(i=> adjustPart(i.id, wh, -i.qty, '販售出貨', staff, s.id, '配件販售'));
  s.status = 'ready';
  if(s.delivery.method==='ship'){
    notify([s.byRole], `🚚 ${id} 已寄出（備貨完成）`, `${s.shipOut.co}／${s.shipOut.no}，請留意收件。`, id);
  } else {
    const o = OFFICES[s.delivery.office];
    notify([s.byRole], `🔔 ${id} 備貨完成可取件`, `請於 ${s.pickupTime} 至 ${o.name}（${o.addr}）取件。`, id);
  }
  save(); toast('✅ 備貨完成，庫存已扣減並自動通知客戶'); render(); refreshModal();
}
function closeSale(id){
  const s = state.sales.find(x=>x.id===id);
  s.status = 'closed'; s.closedAt = Date.now();
  notify([s.byRole], `✅ ${id} 已結案`, '感謝您的購買。', id);
  save(); toast('✅ ' + id + ' 已結案'); render(); refreshModal();
}

function invArr(catKey, transit){
  const rows = state[catKey];
  return `<p class="note">${transit?'調撥自北部出發時進入「運送中」，需按「到貨」確認入倉。':''}每筆異動皆記錄操作人員與時間戳。</p>
  <table><thead><tr><th>品項</th><th>北部</th><th>中部</th><th>南部</th>${transit?'<th>運送中(北→中)</th><th>運送中(北→南)</th>':''}<th>合計</th><th></th></tr></thead><tbody>
  ${rows.map((r,i)=>{
    const total = r.north + r.central + r.south + (transit ? (r.tNC + r.tNS) : 0);
    return `<tr><td>${r.name}</td><td>${r.north}</td><td>${r.central}</td><td>${r.south}</td>
      ${transit?`<td>${r.tNC}${r.tNC>0?` <button class="btn sm ghost" onclick="confirmArrive('${catKey}',${i},'tNC')">到貨</button>`:''}</td>
      <td>${r.tNS}${r.tNS>0?` <button class="btn sm ghost" onclick="confirmArrive('${catKey}',${i},'tNS')">到貨</button>`:''}</td>`:''}
      <td><b>${total}</b></td>
      <td><button class="btn sm ghost" onclick="openAdjust('${catKey}',${i})">異動</button></td></tr>`;
  }).join('')}</tbody></table>`;
}

function invUniforms(){
  let h = `<p class="note">款式 × 尺寸 × 地區。點「異動」記錄入庫／出庫（含操作人員與時間戳）。</p>
  <div class="mt"><button class="btn sm" onclick="openUniAdjust()">＋ 制服異動</button></div>`;
  WHS.forEach(rg=>{
    const rows = state.uniforms.filter(u=>u.region===rg);
    let regionTotal = 0;
    h += `<h4>${WH_LABEL[rg]}</h4>
    <table><thead><tr><th>款式</th>${UNI_SIZES.map(s=>`<th>${s}</th>`).join('')}<th>小計</th></tr></thead><tbody>
    ${rows.map(u=>{
      const sub = UNI_SIZES.reduce((t,s)=>t+u.sizes[s],0); regionTotal += sub;
      return `<tr><td>${u.style}</td>${UNI_SIZES.map(s=>`<td>${u.sizes[s]}</td>`).join('')}<td><b>${sub}</b></td></tr>`;
    }).join('')}
    <tr><td><b>合計</b></td><td colspan="${UNI_SIZES.length}"></td><td><b>${regionTotal}</b></td></tr>
    </tbody></table>`;
  });
  return h;
}

function addDemoLog(){

  state.demoLog.unshift({ date:$('dl_date').value, type:$('dl_type').value, person,

}

function submitAdjust(){
  const { catKey, key } = adj;
  const t = $('aj_type').value, wh = $('aj_wh').value, staff = $('aj_staff').value.trim();
  const q = parseInt($('aj_qty').value);
  const sn = $('aj_sn').value.trim(), noteIn = $('aj_note').value.trim();
  if(!staff) return toast('請填寫操作人員姓名（稽核必填）');
  if(isNaN(q) || q<0 || (t!=='safe' && q===0)) return toast('請填寫有效數量');
  const note = [sn?('序號:'+sn):'', noteIn].filter(Boolean).join('｜');
  if(catKey==='parts'){
    if(t==='safe'){
      state.inv.parts[key][wh].s = q;
      logTxn('安全庫存設定', cat(key).name, WH_LABEL[wh], q, staff, '', note||'設定安全庫存值');
      if(frontStatus(key)==='預購') notify(['stock'],'⚠️ 低庫存提醒',`「${cat(key).name}」合計庫存 ≤ 新安全庫存量，前台已切為「預購」。`,null);
    }
    else if(t==='in') adjustPart(key, wh, q, '入庫', staff, '', note);
    else if(t==='out') adjustPart(key, wh, -q, '出庫', staff, '', note);
    else {
      const to = $('aj_to').value;
      if(to===wh) return toast('調撥來源與目的不可相同');
      adjustPart(key, wh, -q, '調撥', staff, '', `調出至${WH_LABEL[to]}${note?'｜'+note:''}`);
      adjustPart(key, to, q, '調撥', staff, '', `自${WH_LABEL[wh]}調入${note?'｜'+note:''}`);
    }
  } else {
    const row = state[catKey][key];
    const hasTransit = ['machines','acEquip'].includes(catKey);
    if(t==='in'){ row[wh]+=q; logTxn('入庫', row.name, WH_LABEL[wh], q, staff, '', note); }
    else if(t==='out'){ row[wh]-=q; logTxn('出庫', row.name, WH_LABEL[wh], -q, staff, '', note); }
    else {
      const to = $('aj_to').value;
      if(to===wh) return toast('調撥來源與目的不可相同');
      if(row[wh]<q) return toast('來源倉庫存不足');
      row[wh]-=q;
      if(hasTransit && wh==='north' && to!=='north'){
        row[to==='central'?'tNC':'tNS'] += q;
        logTxn('調撥(運送中)', row.name, `北部→${WH_LABEL[to]}`, -q, staff, '', note||'運送中，待到貨確認');
      } else {
        row[to]+=q;
        logTxn('調撥', row.name, `${WH_LABEL[wh]}→${WH_LABEL[to]}`, q, staff, '', note);
      }
    }
  }
  save(); toast('✅ 異動完成，已寫入流水帳'); closeModal(); render();
}

/* ============== 條碼工具（EAN-13） ============== */
function ean13(base12){
  const d = base12.split('').map(Number);
  let s = 0; d.forEach((n,i)=>{ s += n * (i%2 ? 3 : 1); });
  return base12 + ((10 - s%10) % 10);
}
function codeForIndex(i){ return ean13('47100000' + String(i).padStart(4,'0')); }
function barcodeOf(id){
  for(const [c,v] of Object.entries(state.barcodes)) if(v===id) return c;
  return null;
}
function ean13Svg(code){
  const L = ['0001101','0011001','0010011','0111101','0100011','0110001','0101111','0111011','0110111','0001011'];
  const R = L.map(x=>x.split('').map(b=>b==='1'?'0':'1').join(''));
  const G = R.map(x=>x.split('').reverse().join(''));
  const P = ['LLLLLL','LLGLGG','LLGGLG','LLGGGL','LGLLGG','LGGLLG','LGGGLL','LGLGLG','LGLGGL','LGGLGL'];
  const d = code.split('').map(Number);
  let m = '101';
  for(let i=1;i<=6;i++) m += (P[d[0]][i-1]==='L' ? L : G)[d[i]];
  m += '01010';
  for(let i=7;i<=12;i++) m += R[d[i]];
  m += '101';
  const w = 2, h = 56;
  let rects = '', x = 10;
  for(const bit of m){ if(bit==='1') rects += `<rect x="${x*w}" y="0" width="${w}" height="${h}"/>`; x++; }
  const W = (95+20)*w;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${h+16}" viewBox="0 0 ${W} ${h+16}"><rect width="${W}" height="${h+16}" fill="#fff"/><g fill="#000">${rects}</g><text x="${W/2}" y="${h+13}" font-size="12" text-anchor="middle" font-family="monospace">${code}</text></svg>`;
}

function scanMsg(m){ const el = $('scanMsg'); if(el) el.innerHTML = m; }
function toggleScan(){ scanning ? stopScan() : startScan(); }

async function startScan(){
  scanning = true; scanBusy = false;
  if($('scanBtn')) $('scanBtn').textContent = '⏹ 停止掃描';
  scanMsg('開啟相機中…');
  try{
    if('BarcodeDetector' in window){
      try{ scanDetector = new BarcodeDetector({ formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code'] }); }
      catch(e){ scanDetector = new BarcodeDetector(); }
      scanStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false });
      const v = $('scanVideo'); v.srcObject = scanStream; await v.play();
      scanMsg('📡 掃描中，請將條碼對準框內…');
      scanTick();
    } else {
      await loadZXing();
      zxReader = new ZXing.BrowserMultiFormatReader();
      scanMsg('📡 掃描中（ZXing），請將條碼對準框內…');
      await zxReader.decodeFromVideoDevice(undefined, 'scanVideo', (result)=>{
        if(result && scanning && !scanBusy) onCode(result.getText());
      });
    }
  }catch(e){
    scanning = false;
    if($('scanBtn')) $('scanBtn').textContent = '📷 開始掃描';
    scanMsg('❌ 無法開啟相機：' + esc(e.message) + '<br>請確認已允許相機權限並使用 HTTPS 網址，或改用下方手動輸入。');
  }
}
function scanTick(){
  if(!scanning || !scanDetector) return;
  const v = $('scanVideo');
  if(!v){ stopScan(); return; }
  scanDetector.detect(v)
    .then(codes=>{ if(codes && codes.length && scanning && !scanBusy) onCode(codes[0].rawValue); })
    .catch(()=>{})
    .finally(()=>{ if(scanning) setTimeout(scanTick, 250); });
}
function stopScan(){
  scanning = false;
  if(zxReader){ try{ zxReader.reset(); }catch(e){} zxReader = null; }
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
  const v = $('scanVideo'); if(v) v.srcObject = null;
  if($('scanBtn')) $('scanBtn').textContent = '📷 開始掃描';
  scanMsg('');
}
function loadZXing(){
  return new Promise((res, rej)=>{
    if(window.ZXing) return res();
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
    s.onload = ()=>res();
    s.onerror = ()=>rej(new Error('ZXing 函式庫載入失敗（請檢查網路）'));
    document.head.appendChild(s);
  });
}
function beep(){
  try{
    const a = new (window.AudioContext||window.webkitAudioContext)();
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.frequency.value = 1400; g.gain.value = .12;
    o.start(); setTimeout(()=>{ o.stop(); a.close(); }, 120);
  }catch(e){}
}
function onCode(code){
  scanBusy = true;
  stopScan();
  try{ navigator.vibrate && navigator.vibrate(80); }catch(e){}
  beep();

  scanBusy = false;
}

function normCode(c){ return String(c).trim().toUpperCase().replace(/[^0-9A-Z]/g,''); }
function lookupPart(code){
  if(state.barcodes[code]) return state.barcodes[code];
  const n = normCode(code);
  for(const [c,id] of Object.entries(state.barcodes)) if(normCode(c)===n) return id;
  return null;
}
function lookupMachine(code){
  const n = normCode(code);
  return state.machineReg.find(m=>normCode(m.sn)===n);
}
function handleCode(code){
  code = String(code).trim();
  const rec = { ts:Date.now(), code, item:null, action:null };
  lastScans.unshift(rec);
  const id = lookupPart(code);
  if(id && state.inv.parts[id]){
    rec.item = cat(id).name;
    openItemAction(code, id, rec);
  } else {
    const m = lookupMachine(code);
    if(m){ rec.item = `${m.model}（機器）`; openMachineAction(m.sn, rec); }
    else openBindOrCreate(code, rec);
  }
  render();
}

    <div class="field"><span>出貨日期 *（保固起算）</span><input type="date" id="ma_date" value="${todayISO()}" style="width:100%"></div>`;
  if(t==='move') f += `<div class="field"><span>調撥至 *</span><select id="ma_to" style="width:100%">${WHS.map(w=>`<option value="${w}">${WH_LABEL[w]}倉庫</option>`).join('')}</select></div>`;
  if(t==='lend') f += `<div class="field"><span>借用業務／借用人 *</span><input id="ma_borrower" style="width:100%"></div>`;
  f += `<div class="field"><span>操作人員姓名 *</span><input id="ma_staff" style="width:100%"></div></div>
  <button class="btn green" onclick="submitMachineAct()">確認${{ship:'出貨交機',move:'調撥',lend:'借出',return:'入庫'}[t]}</button>`;
  $('maForm').innerHTML = f;
}
function submitMachineAct(){
  const { sn, rec, act } = scanCtx;
  const m = state.machineReg.find(x=>x.sn===sn);
  const staff = $('ma_staff').value.trim();
  if(!staff) return toast('請填寫操作人員姓名');
  const row = machineRow(m);
  const label = `${m.type}（${m.model}）`;
  if(act==='ship'){
    const owner = $('ma_owner').value.trim(), date = $('ma_date').value;
    if(!owner || !date) return toast('請填寫交機對象與出貨日期');
    m.status = '已出貨'; m.owner = owner; m.shipDate = date;
    if(row) row[m.wh] = Math.max(0, row[m.wh]-1);
    m.history.push({ ts:Date.now(), action:'出貨交機 '+owner, staff });
    logTxn('機器出貨', label, WH_LABEL[m.wh], -1, staff, '', `序號 ${m.sn}｜交機 ${owner}｜保固至 ${warranty(date).end}`);
    rec.action = '出貨交機 '+owner;
  } else if(act==='move'){
    const to = $('ma_to').value;
    if(to===m.wh) return toast('調撥來源與目的相同');
    if(row){ row[m.wh] = Math.max(0, row[m.wh]-1); row[to]++; }
    m.history.push({ ts:Date.now(), action:`調撥 ${WH_LABEL[m.wh]}→${WH_LABEL[to]}`, staff });
    logTxn('調撥', label, `${WH_LABEL[m.wh]}→${WH_LABEL[to]}`, 1, staff, '', `序號 ${m.sn}（掃碼）`);
    rec.action = `調撥 ${WH_LABEL[m.wh]}→${WH_LABEL[to]}`;
    m.wh = to;
  } else if(act==='lend'){
    const borrower = $('ma_borrower').value.trim();
    if(!borrower) return toast('請填寫借用人');
    m.status = '借出中'; m.borrower = borrower;
    if(row) row[m.wh] = Math.max(0, row[m.wh]-1);
    const dtype = m.type==='租賃Demo' ? 'Demo機租賃' : (m.type.includes('拍打頭') ? '借DEMO拍打頭' : '借DEMO主機');
    state.demoLog.unshift({ date:todayISO(), type:dtype, person:borrower, qty:1, note:'掃碼借出｜序號 '+m.sn, staff, ts:Date.now() });
    m.history.push({ ts:Date.now(), action:'DEMO借出 '+borrower, staff });
    logTxn('DEMO借出', label, WH_LABEL[m.wh], -1, staff, '', `序號 ${m.sn}｜借用 ${borrower}`);
    rec.action = 'DEMO借出 '+borrower;
  } else if(act==='return'){
    const from = m.status;
    if(from==='借出中'){
      state.demoLog.unshift({ date:todayISO(), type:'借DEMO主機', person:m.borrower||'—', qty:1, note:'歸還｜序號 '+m.sn, staff, ts:Date.now() });
    }
    m.status = '在庫'; m.borrower = null;
    if(row) row[m.wh]++;
    m.history.push({ ts:Date.now(), action:(from==='已出貨'?'返廠入庫':'歸還入庫'), staff });
    logTxn('機器入庫', label, WH_LABEL[m.wh], 1, staff, '', `序號 ${m.sn}｜${from==='已出貨'?'返廠':'歸還'}`);
    rec.action = from==='已出貨' ? '返廠入庫' : '歸還入庫';
  }
  save(); toast('✅ ' + rec.action + '，已寫入流水帳'); closeModal(); render();
}

/* ── 有庫存：出貨／入庫／盤點／調撥 ── */
var scanCtx = null;
function openItemAction(code, id, rec){
  scanCtx = { code, id, rec };
  const c = cat(id), e = state.inv.parts[id], t = partTotals(id);
  openModal(`<h3>✅ 已找到庫存品項</h3>
  <div class="okbox"><b style="font-size:16px">${esc(c.name)}</b>${c.custom?' <span class="badge b-blue">自訂</span>':''}　${fsBadge(id)}<br>
  <span class="note" style="font-family:monospace">條碼 ${esc(code)}</span></div>
  <table><thead><tr><th>倉別</th><th>庫存</th><th>安全量</th></tr></thead><tbody>
    ${WHS.map(w=>`<tr><td>${WH_LABEL[w]}</td><td class="${e[w].q<=e[w].s?'low':''}">${e[w].q}</td><td>${e[w].s}</td></tr>`).join('')}
    <tr><td><b>合計</b></td><td><b>${t.q}</b></td><td>${t.s}</td></tr>
  </tbody></table>
  <h4>請選擇作業</h4>
  <div class="pill-tabs">
    <div class="pill" id="sa_out" onclick="scanAct('out')">📤 出貨</div>
    <div class="pill" id="sa_in" onclick="scanAct('in')">📥 入庫</div>
    <div class="pill" id="sa_count" onclick="scanAct('count')">🔢 盤點</div>
    <div class="pill" id="sa_move" onclick="scanAct('move')">🔁 調撥</div>
  </div>
  <div id="saForm"></div>`);
  scanAct('out');
}
function scanAct(t){
  scanCtx.act = t;
  ['out','in','count','move'].forEach(k=>{ const p = $('sa_'+k); if(p) p.className = 'pill' + (k===t?' on':''); });
  const e = state.inv.parts[scanCtx.id];
  const whSel = (idAttr)=>`<select id="${idAttr}" style="width:100%">${WHS.map(w=>`<option value="${w}">${WH_LABEL[w]}（現有 ${e[w].q}）</option>`).join('')}</select>`;
  let f = `<div class="grid2 mt">`;
  if(t==='move'){
    f += `<div class="field"><span>調撥自 *</span>${whSel('sa_wh')}</div>
          <div class="field"><span>調撥至 *</span>${whSel('sa_to')}</div>
          <div class="field"><span>數量 *</span><input type="number" id="sa_qty" value="1" min="1" style="width:100%"></div>`;
  } else if(t==='count'){
    f += `<div class="field"><span>盤點倉別 *</span>${whSel('sa_wh')}</div>
          <div class="field"><span>實盤數量 *（系統自動計算差異調整）</span><input type="number" id="sa_qty" min="0" placeholder="實際清點數" style="width:100%"></div>`;
  } else {
    f += `<div class="field"><span>${t==='out'?'出貨倉別':'進倉位置'} *</span>${whSel('sa_wh')}</div>
          <div class="field"><span>數量 *</span><input type="number" id="sa_qty" value="1" min="1" style="width:100%"></div>`;
  }
  f += `<div class="field"><span>操作人員姓名 *</span><input id="sa_staff" style="width:100%"></div>
        <div class="field"><span>備註／關聯單號</span><input id="sa_note" style="width:100%"></div></div>
        <button class="btn green" onclick="submitScanAct()">確認${{out:'出貨',in:'入庫',count:'盤點',move:'調撥'}[t]}</button>`;
  $('saForm').innerHTML = f;
}
function submitScanAct(){
  const { id, act, rec } = scanCtx;
  const staff = $('sa_staff').value.trim();
  if(!staff) return toast('請填寫操作人員姓名');
  const wh = $('sa_wh').value;
  const q = parseInt($('sa_qty').value);
  const note = $('sa_note').value.trim();
  const e = state.inv.parts[id];
  if(act==='count'){
    if(isNaN(q) || q<0) return toast('請填寫實盤數量');
    const book = e[wh].q, diff = q - book;
    if(diff===0){ rec.action = `盤點 ${WH_LABEL[wh]}：帳實相符（${q}）`; save(); toast('✅ 盤點完成：帳實相符'); closeModal(); render(); return; }
    adjustPart(id, wh, diff, '盤點調整', staff, '', `帳面${book}→實盤${q}${note?'｜'+note:''}`);
    rec.action = `盤點 ${WH_LABEL[wh]}：調整 ${diff>0?'+':''}${diff}`;
  } else if(act==='move'){
    const to = $('sa_to').value;
    if(to===wh) return toast('調撥來源與目的不可相同');
    if(isNaN(q) || q<1) return toast('請填寫有效數量');
    if(e[wh].q < q) return toast('來源倉庫存不足');
    adjustPart(id, wh, -q, '調撥', staff, '', `掃碼調出至${WH_LABEL[to]}${note?'｜'+note:''}`);
    adjustPart(id, to, q, '調撥', staff, '', `掃碼自${WH_LABEL[wh]}調入${note?'｜'+note:''}`);
    rec.action = `調撥 ${WH_LABEL[wh]}→${WH_LABEL[to]} ×${q}`;
  } else {
    if(isNaN(q) || q<1) return toast('請填寫有效數量');
    if(act==='out' && e[wh].q < q) return toast(`${WH_LABEL[wh]}倉庫存不足（現有 ${e[wh].q}）`);
    adjustPart(id, wh, act==='in'?q:-q, act==='in'?'入庫(掃碼)':'出貨(掃碼)', staff, '', note);
    rec.action = `${act==='in'?'入庫':'出貨'} ${WH_LABEL[wh]} ×${q}`;
  }
  save(); toast('✅ ' + rec.action + '，已寫入流水帳'); closeModal(); render();
}

/* ── 查無條碼：先詢問是否新增庫存 ── */
function openBindOrCreate(code, rec){
  scanCtx = { code, rec };
  const likelySN = /[-A-Za-z]/.test(code) || !/^\d{13}$/.test(code); // 含破折號/字母或非EAN-13 → 較可能是機器序號
  openModal(`<h3>❓ 查無此條碼</h3>
  <div class="warnbox">條碼 <b style="font-family:monospace">${esc(code)}</b> 不在庫存系統中。${likelySN?'<br><span class="note">格式類似機器序號（如 4664-004688）。</span>':''}</p></div>
  <p style="font-size:16px;margin:14px 0"><b>是否要新增此庫存？</b></p>
  <div class="flexrow">
    ${likelySN
      ? `<button class="btn green" onclick="openCreateMachine()">✅ 是，新增機器（序號建檔）</button>
         <button class="btn" onclick="openCreateForm()">📦 是，新增配件品項</button>`
      : `<button class="btn green" onclick="openCreateForm()">✅ 是，新增配件品項</button>
         <button class="btn" onclick="openCreateMachine()">🖥️ 是，新增機器（序號建檔）</button>`}
    <button class="btn ghost" onclick="cancelNotFound()">❌ 否，取消</button>
  </div>
  <p class="note mt">此條碼其實是既有商品（如新包裝、原廠國際條碼）？<a href="javascript:openBindForm()">改為綁定到既有品項 →</a></p>`);
}
function openCreateMachine(){
  const { code } = scanCtx;
  openModal(`<h3>🖥️ 新增機器（序號建檔）</h3>
  <div class="infobox">以掃描到的序號為此台機器建立唯一追蹤檔案（型號登錄）。</div>
  <div class="grid2">
    <div class="field"><span>機器序號 *</span><input id="nm_sn" value="${esc(code)}" style="width:100%;font-family:monospace"></div>
    <div class="field"><span>機器型號 *</span><input id="nm_model" value="${MACHINE_MODEL_DEFAULT}" style="width:100%"></div>
    <div class="field"><span>機器類型 *</span><select id="nm_type" style="width:100%">${state.machines.map(r=>`<option>${r.name}</option>`).join('')}</select></div>
    <div class="field"><span>進倉位置 *</span><select id="nm_wh" style="width:100%">${WHS.map(w=>`<option value="${w}">${WH_LABEL[w]}倉庫</option>`).join('')}</select></div>
    <div class="field"><span>進倉點收人員姓名 *</span><input id="nm_staff" style="width:100%"></div>
    <div class="field"><span>備註</span><input id="nm_note" style="width:100%"></div>
  </div>
  <div class="flexrow">
    <button class="btn green" onclick="createMachineFromScan()">建檔並入庫</button>
    <button class="btn ghost" onclick="openBindOrCreate(scanCtx.code, scanCtx.rec)">← 返回</button>
  </div>`);
}
function createMachineFromScan(){
  const { rec } = scanCtx;
  const sn = $('nm_sn').value.trim(), model = $('nm_model').value.trim(), staff = $('nm_staff').value.trim();
  if(!sn) return toast('請填寫機器序號');
  if(!model) return toast('請填寫機器型號');
  if(!staff) return toast('請填寫點收人員姓名');
  if(lookupMachine(sn)) return toast('此序號已建檔');
  const type = $('nm_type').value, wh = $('nm_wh').value, note = $('nm_note').value.trim();
  const m = { sn, model, type, wh, status:'在庫',
    history:[{ ts:Date.now(), action:'進倉建檔' + (note?'｜'+note:''), staff }] };
  state.machineReg.push(m);
  const row = machineRow(m); if(row) row[wh]++;
  logTxn('機器入庫', `${type}（${model}）`, WH_LABEL[wh], 1, staff, '', `序號 ${sn}｜掃碼建檔`);
  rec.item = `${model}（機器）`; rec.action = '序號建檔入庫';
  save(); toast('✅ 機器 ' + sn + ' 已建檔入庫');
  openMachineAction(sn, rec); render();
}
function cancelNotFound(){
  scanCtx.rec.action = '取消';
  save(); closeModal(); render();
  toast('已取消，可繼續掃描');
}
function openCreateForm(){
  const { code } = scanCtx;
  openModal(`<h3>➕ 新增庫存品項</h3>
  <div class="infobox">將綁定條碼 <b style="font-family:monospace">${esc(code)}</b></div>
  <div class="grid2">
    <div class="field"><span>品項名稱 *</span><input id="nw_name" placeholder="如：新款濾心" style="width:100%"></div>
    <div class="field"><span>進倉點收人員姓名 *</span><input id="nw_staff" style="width:100%"></div>
    <div class="field"><span>北部初始數量</span><input type="number" id="nw_n" value="0" min="0" style="width:100%"></div>
    <div class="field"><span>中部初始數量</span><input type="number" id="nw_c" value="0" min="0" style="width:100%"></div>
    <div class="field"><span>南部初始數量</span><input type="number" id="nw_s" value="0" min="0" style="width:100%"></div>
    <div class="field"><span>安全庫存量（各倉套用）</span><input type="number" id="nw_safe" value="2" min="0" style="width:100%"></div>
  </div>
  <div class="flexrow">
    <button class="btn green" onclick="createItemFromScan()">新增品項並入庫</button>
    <button class="btn ghost" onclick="openBindOrCreate(scanCtx.code, scanCtx.rec)">← 返回</button>
  </div>`);
}
function openBindForm(){
  const { code } = scanCtx;
  openModal(`<h3>🔗 綁定到既有品項</h3>
  <div class="infobox">將條碼 <b style="font-family:monospace">${esc(code)}</b> 綁定到系統中的既有品項，之後掃描即可直接作業。</div>
  <div class="flexrow">
    <select id="bd_item" style="max-width:240px">${allItems().map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
    <button class="btn" onclick="bindCode()">綁定條碼</button>
    <button class="btn ghost" onclick="openBindOrCreate(scanCtx.code, scanCtx.rec)">← 返回</button>
  </div>`);
}
function bindCode(){
  const { code, rec } = scanCtx;
  const id = $('bd_item').value;
  state.barcodes[code] = id;
  rec.item = cat(id).name; rec.action = '綁定條碼';
  logTxn('條碼綁定', cat(id).name, '—', 0, '—', '', '條碼 ' + code);
  save(); toast('✅ 已綁定「' + cat(id).name + '」');
  openItemAction(code, id, rec); render();
}
function createItemFromScan(){
  const { code, rec } = scanCtx;
  const name = $('nw_name').value.trim(), staff = $('nw_staff').value.trim();
  if(!name) return toast('請填寫品項名稱');
  if(!staff) return toast('請填寫進倉點收人員姓名');
  const safe = Math.max(0, parseInt($('nw_safe').value)||0);
  const id = 'c' + (++state.seq.c);
  state.customItems.push({ id, name, custom:true });
  state.inv.parts[id] = { north:{q:0,s:safe}, central:{q:0,s:safe}, south:{q:0,s:safe} };
  state.barcodes[code] = id;
  const init = { north:parseInt($('nw_n').value)||0, central:parseInt($('nw_c').value)||0, south:parseInt($('nw_s').value)||0 };
  let any = false;
  WHS.forEach(w=>{ if(init[w]>0){ any = true; adjustPart(id, w, init[w], '新品入庫', staff, '', '掃碼建檔｜條碼 ' + code); } });
  if(!any) logTxn('新品建檔', name, '—', 0, staff, '', '條碼 ' + code);
  rec.item = name; rec.action = '新增品項' + (any ? '並入庫' : '');
  save(); toast('✅ 已新增品項「' + name + '」並綁定條碼');
  closeModal(); render();
}

/* ── 條碼清單（供另一台裝置顯示／列印） ── */
function code39Svg(text){
  const map = { '0':'000110100','1':'100100001','2':'001100001','3':'101100000','4':'000110001',
    '5':'100110000','6':'001110000','7':'000100101','8':'100100100','9':'001100100',
    '-':'010000101','*':'010010100' };
  const t = '*' + String(text).toUpperCase() + '*';
  const nw = 2, ww = 5, h = 56;
  let x = 10, rects = '';
  for(const ch of t){
    const p = map[ch]; if(!p) continue;
    for(let i=0;i<9;i++){
      const w = p[i]==='1' ? ww : nw;
      if(i%2===0) rects += `<rect x="${x}" y="0" width="${w}" height="${h}"/>`;
      x += w;
    }
    x += nw;
  }
  const W = x + 10;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${h+16}" viewBox="0 0 ${W} ${h+16}"><rect width="${W}" height="${h+16}" fill="#fff"/><g fill="#000">${rects}</g><text x="${W/2}" y="${h+13}" font-size="12" text-anchor="middle" font-family="monospace">${esc(text)}</text></svg>`;
}
function openBarcodeSheet(){
  const partCards = allItems().map(c=>{
    const code = barcodeOf(c.id);
    if(!code) return '';
    const svg = /^\d{13}$/.test(code) ? ean13Svg(code) : code39Svg(code);
    return `<div class="bc-card"><b>${esc(c.name)}</b><div class="mt">${svg}</div></div>`;
  }).join('');
  const mCards = state.machineReg.map(m=>
    `<div class="bc-card"><b>${esc(m.model)}</b> <span class="badge ${M_STATUS[m.status]}">${m.status}</span><div class="mt">${code39Svg(m.sn)}</div></div>`
  ).join('');
  openModal(`<h3>📋 品項條碼清單</h3>
  <p class="note">用另一台裝置開啟此清單供手機掃描測試，或列印貼於貨架／商品上。</p>
  <h4>🖥️ 機器序號（Code 39，同機身標籤格式）</h4>
  <div class="bc-grid">${mCards}</div>
  <h4 class="mt">📦 配件品項（EAN-13）</h4>
  <div class="bc-grid">${partCards}</div>`);
}

if(!load()) seed();
render();
